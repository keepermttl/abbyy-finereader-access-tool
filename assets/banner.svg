<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1f33"/>
      <stop offset="55%" stop-color="#123354"/>
      <stop offset="100%" stop-color="#0a2942"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e7f1fb"/>
      <stop offset="100%" stop-color="#c3d9ef"/>
    </linearGradient>
    <linearGradient id="pageGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dbe9f8"/>
      <stop offset="100%" stop-color="#aecdea"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#33c9c9"/>
      <stop offset="100%" stop-color="#2f8fd0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3fd0d0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3fd0d0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="100%" stop-color="#e6b64d"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="360" fill="url(#bg)"/>

  <circle cx="950" cy="120" r="220" fill="url(#glow)"/>

  <!-- faint grid lines suggesting scanning/software -->
  <g stroke="#1f4a6e" stroke-width="1" opacity="0.35">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
  </g>

  <!-- stacked document pages, right side -->
  <g transform="translate(830,60)">
    <rect x="30" y="30" width="220" height="270" rx="10" fill="url(#pageGrad2)" opacity="0.6" transform="rotate(6 140 165)"/>
    <rect x="10" y="10" width="220" height="270" rx="10" fill="url(#pageGrad)" opacity="0.85" transform="rotate(-4 120 145)"/>
    <rect x="0" y="0" width="220" height="270" rx="10" fill="url(#pageGrad)"/>
    <g opacity="0.55">
      <line x1="25" y1="35" x2="195" y2="35" stroke="#3a6b96" stroke-width="4"/>
      <line x1="25" y1="55" x2="175" y2="55" stroke="#3a6b96" stroke-width="4"/>
      <line x1="25" y1="75" x2="195" y2="75" stroke="#3a6b96" stroke-width="4"/>
      <line x1="25" y1="95" x2="150" y2="95" stroke="#3a6b96" stroke-width="4"/>
      <line x1="25" y1="120" x2="195" y2="120" stroke="#3a6b96" stroke-width="4"/>
      <line x1="25" y1="140" x2="170" y2="140" stroke="#3a6b96" stroke-width="4"/>
      <line x1="25" y1="160" x2="195" y2="160" stroke="#3a6b96" stroke-width="4"/>
      <line x1="25" y1="180" x2="140" y2="180" stroke="#3a6b96" stroke-width="4"/>
    </g>
    <!-- scan beam -->
    <rect x="0" y="150" width="220" height="14" fill="#33c9c9" opacity="0.5"/>
    <rect x="0" y="150" width="220" height="2" fill="#eafffb" opacity="0.9"/>
  </g>

  <!-- key icon symbolizing license/access -->
  <g transform="translate(1000,220)">
    <circle cx="0" cy="0" r="26" fill="none" stroke="url(#keyGrad)" stroke-width="10"/>
    <rect x="18" y="-6" width="70" height="12" rx="4" fill="url(#keyGrad)"/>
    <rect x="70" y="-16" width="10" height="20" fill="url(#keyGrad)"/>
    <rect x="86" y="-12" width="10" height="16" fill="url(#keyGrad)"/>
  </g>

  <!-- decorative unlocked padlock silhouette faint -->
  <g transform="translate(1080,60)" opacity="0.25">
    <rect x="0" y="20" width="60" height="45" rx="8" fill="#8fd8d8"/>
    <path d="M10 20 v-15 a20 20 0 0 1 40 -3" stroke="#8fd8d8" stroke-width="8" fill="none"/>
  </g>

  <!-- headline -->
  <text x="60" y="150" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="64" fill="#f3f9ff">
    <tspan x="60" y="150" textLength="760" lengthAdjust="spacingAndGlyphs">ABBYY FineReader PDF</tspan>
    <tspan x="60" y="225" textLength="430" lengthAdjust="spacingAndGlyphs" fill="url(#accent)">Full Access +</tspan>
  </text>

  <!-- tagline -->
  <text x="60" y="270" font-family="'Segoe UI', Arial, sans-serif" fill="#bcd6ea" textLength="1080.0" lengthAdjust="spacingAndGlyphs" font-size="20.5">
    Unlock every scanning, OCR, and PDF editing tool—fully licensed access, ready to use.
  </text>

  <!-- thin accent underline -->
  <rect x="60" y="290" width="180" height="6" rx="3" fill="url(#accent)"/>
</svg>